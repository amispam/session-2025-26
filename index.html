<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#6D28D9" />
    <title>Class XI — Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root{--bg:#0b1220;--card:#0f172a;--accent:#7c3aed;--text:#e6eef8}
      *{box-sizing:border-box}
      html,body{height:100%;margin:0;font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text)}
      body{display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#071028 0%, #081227 60%)}

      .card{width:100%;max-width:520px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:20px;border-radius:14px;box-shadow:0 6px 20px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.03)}
      .top{display:flex;align-items:center;gap:12px}
      .logo{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:700}
      h1{margin:0;font-size:20px}
      p.lead{margin:4px 0 0 0;color:rgba(230,238,248,0.85);font-size:13px}

      .actions{display:flex;gap:10px;margin-top:16px}
      .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 14px;border-radius:10px;background:var(--accent);color:white;text-decoration:none;font-weight:600}
      .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.07);color:var(--text)}

      footer{margin-top:14px;text-align:center;font-size:12px;color:rgba(230,238,248,0.6)}

      @media (max-width:420px){
        .top{flex-direction:row;gap:10px}
        .actions{flex-direction:column}
        .btn{width:100%}
        .logo{width:48px;height:48px}
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="top">
        <div class="logo">XI</div>
        <div>
          <h1>Class XI</h1>
          <p class="lead">Annual Examination Results</p>
        </div>
      </div>

      <div class="actions">
        <a class="btn" id="openDrive" href="https://drive.google.com/file/d/1XT3MO8Dyu0884oCWRW7-G2H3JcN6EuEb/view?usp=sharing" target="_blank" rel="noopener">Open Results (Google Drive)</a>
      </div>

      <footer>© School — Best of luck</footer>
    </main>
  </body>
</html>
